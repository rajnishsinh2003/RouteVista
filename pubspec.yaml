name: routevista
description: "RouteVista-Intelligent Route-Based Tourism Discovery & Travel Assistance Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  http: ^1.2.1
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.8
  flutter_cache_manager: ^3.3.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  flutter_tts: ^4.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  share_plus: ^13.0.0
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^21.0.0
  cloud_firestore: ^5.4.4
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  google_generative_ai: ^0.4.7
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.4.0"
  flutter_lints: ^6.0.0
  plugin_platform_interface: ^2.1.8

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1B2A"
  image: "assets/icon/icon.png"
  
  android_12:
    image: "assets/icon/icon.png"
    color: "#0D1B2A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/icon/MarwadiUniversity.png
    - assets/icon/
    - assets/json/places.json
    - assets/json/train_dataset_1200.json
